<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Overhead Radar PRO</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* --- APPLE DESIGN SYSTEM (GLASSMORPHISM) --- */
:root {
  --bg-primary: rgba(242, 242, 247, 0.65);
  --label-primary: #1C1C1E;
  --apple-blue: #007AFF;
  --apple-green: #34C759;
  --glass-sheet: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(0, 0, 0, 0.08);
  --blur-heavy: saturate(180%) blur(35px);
  --spring: cubic-bezier(0.32, 0.72, 0, 1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: rgba(28, 28, 30, 0.55);
    --label-primary: #FFFFFF;
    --glass-sheet: rgba(28, 28, 30, 0.75);
    --glass-border: rgba(255, 255, 255, 0.12);
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

#map { position: absolute; inset: 0; z-index: 1; }

/* Dynamic Island Style */
.island-wrap { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 400px; pointer-events: none; }
.island { 
    background: #000; border-radius: 30px; padding: 10px 20px; color: white; 
    display: flex; align-items: center; justify-content: space-between; 
    pointer-events: auto; transition: all 0.5s var(--spring);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Boarding Pass (Apple Wallet Style) */
.pass-card {
    background: var(--glass-sheet); backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy);
    border-radius: 24px; margin: 15px; padding: 20px; border: 1px solid var(--glass-border);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}
.pass-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.airport-code { font-size: 32px; font-weight: 800; letter-spacing: -1px; }

/* Telemetry & Physics Bits */
.telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
.tele-box { background: rgba(0,0,0,0.04); padding: 12px; border-radius: 16px; }
.tele-label { font-size: 10px; text-transform: uppercase; opacity: 0.6; font-weight: 700; }
.tele-value { font-size: 16px; font-weight: 700; }

/* Turbulenssi-indikaattori */
.turb-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.turb-smooth { background: var(--apple-green); }
.turb-light { background: var(--apple-orange); }
.turb-mod { background: var(--apple-red); animation: blink 0.5s infinite; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

/* Bottom Sheet */
.sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 900;
    background: var(--glass-sheet); backdrop-filter: var(--blur-heavy);
    border-top: 1px solid var(--glass-border);
    border-radius: 30px 30px 0 0;
    transition: transform 0.5s var(--spring);
    height: 80vh; transform: translateY(70vh);
}
.sheet.open { transform: translateY(10vh); }
.handle { width: 40px; height: 5px; background: rgba(0,0,0,0.2); border-radius: 3px; margin: 12px auto; }
</style>
</head>
<body>

<div id="map"></div>

<div class="island-wrap">
    <div class="island" id="island">
        <div style="font-weight: 800; font-size: 14px;">OVERHEAD</div>
        <input id="search" placeholder="Search Callsign..." style="background:transparent; border:none; color:white; outline:none; text-align:right;">
    </div>
</div>

<div class="sheet" id="sheet">
    <div class="handle" id="handle"></div>
    <div id="detailView" style="display:none; padding-bottom: 50px; overflow-y: auto; height: 100%;">
        
        <div class="pass-card">
            <div class="pass-header">
                <div><div class="tele-label" id="airlineName">Airline</div><div class="airport-code" id="depIata">???</div></div>
                <div style="font-size: 24px;">✈️</div>
                <div style="text-align: right;"><div class="tele-label">Destination</div><div class="airport-code" id="arrIata">???</div></div>
            </div>
            
            <div id="flightPhase" style="text-align:center; font-weight:700; color:var(--apple-blue); margin-bottom:15px;">CRUISING</div>

            <div class="telemetry-grid">
                <div class="tele-box"><div class="tele-label">Altitude</div><div class="tele-value" id="valAlt">---</div></div>
                <div class="tele-box"><div class="tele-label">Ground Speed</div><div class="tele-value" id="valSpd">---</div></div>
                <div class="tele-box"><div class="tele-label">G-Force</div><div class="tele-value" id="valG">1.0 G</div></div>
                <div class="tele-box"><div class="tele-label">Turbulence</div><div class="tele-value"><span id="turbDot" class="turb-dot"></span><span id="valTurb">Smooth</span></div></div>
            </div>
        </div>

        <div style="padding: 0 20px;">
            <div class="tele-label">Pilot's Announcement</div>
            <p id="paText" style="font-style: italic; font-size: 14px; color: var(--label-primary); opacity: 0.8; line-height: 1.4;">"Ladies and gentlemen, we are currently cruising at our flight altitude..."</p>
        </div>

        <div id="cityImage" style="width:92%; height:150px; margin:20px auto; border-radius:20px; background-size:cover; background-position:center;"></div>
    </div>
    
    <div id="listView" style="padding: 20px;">
        <h2 style="margin-top:0;">Nearby Flights</h2>
        <div id="flightList"></div>
    </div>
</div>

<script>
// --- CORE LOGIC & TELEMETRY ---
const $ = id => document.getElementById(id);
const state = { 
    flights: new Map(), 
    selectedIcao: null, 
    isMetric: new Intl.NumberFormat(navigator.language).resolvedOptions().locale !== 'en-US'
};

// Yksikkömuunnokset (Nippelitieto #1)
const fmtAlt = (ft) => {
    if (!ft) return "---";
    const m = Math.round(ft * 0.3048);
    return state.isMetric ? `${ft.toLocaleString()} FT (${m.toLocaleString()} m)` : `${ft.toLocaleString()} FT`;
};

const fmtSpd = (kt) => {
    if (!kt) return "---";
    const kmh = Math.round(kt * 1.852);
    return state.isMetric ? `${kt} KT (${kmh} km/h)` : `${kt} KT`;
};

// Turbulenssi-algoritmi (Nippelitieto #2)
const getTurbulence = (vRate, alt) => {
    const absV = Math.abs(vRate);
    if (alt < 5000 && absV > 500) return { label: "Moderate Chop", class: "turb-mod" };
    if (absV > 250) return { label: "Light Chop", class: "turb-light" };
    return { label: "Smooth Air", class: "turb-smooth" };
};

// G-voima laskenta (Nippelitieto #3)
const calcG = (vRateChange) => {
    // Hyvin yksinkertaistettu fysiikkasimulaatio
    const g = 1.0 + (vRateChange / 2000);
    return g.toFixed(2) + " G";
};

// --- MAP & DATA ---
const map = L.map('map', { zoomControl: false }).setView([60.1699, 24.9384], 7);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

async function updateData() {
    try {
        const res = await fetch('https://api.airplanes.live/v2/point/60.1/24.9/250');
        const data = await res.json();
        
        data.ac.forEach(f => {
            const old = state.flights.get(f.hex);
            const vRateChange = old ? (f.baro_rate - old.baro_rate) : 0;
            
            const flight = {
                ...f,
                gForce: calcG(vRateChange),
                turb: getTurbulence(f.baro_rate || 0, f.alt_baro || 0)
            };
            state.flights.set(f.hex, flight);
            updateMarker(flight);
        });
        
        if (state.selectedIcao) updateDetailView();
        renderList();
    } catch (e) { console.error("Data error", e); }
}

const markers = {};
function updateMarker(f) {
    if (!markers[f.hex]) {
        markers[f.hex] = L.marker([f.lat, f.lon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="transform: rotate(${f.track}deg)">✈️</div>`
            })
        }).addTo(map).on('click', () => openFlight(f.hex));
    } else {
        markers[f.hex].setLatLng([f.lat, f.lon]);
    }
}

function openFlight(icao) {
    state.selectedIcao = icao;
    $('detailView').style.display = 'block';
    $('listView').style.display = 'none';
    $('sheet').classList.add('open');
    updateDetailView();
}

function updateDetailView() {
    const f = state.flights.get(state.selectedIcao);
    if (!f) return;
    
    $('depIata').textContent = f.flight ? f.flight.substring(0,3) : "HEL";
    $('arrIata').textContent = "JFK"; // Tähän haettaisiin adsbdb-data oikeasti
    $('valAlt').textContent = fmtAlt(f.alt_baro);
    $('valSpd').textContent = fmtSpd(f.gs);
    $('valG').textContent = f.gForce;
    $('valTurb').textContent = f.turb.label;
    $('turbDot').className = `turb-dot ${f.turb.class}`;
    
    // Phase Detection
    let phase = "CRUISING";
    if (f.alt_baro < 2000) phase = "FINAL APPROACH";
    else if (f.baro_rate > 1000) phase = "CLIMBING";
    else if (f.baro_rate < -1000) phase = "DESCENDING";
    $('flightPhase').textContent = phase;
}

function renderList() {
    const list = $('flightList');
    list.innerHTML = "";
    [...state.flights.values()].slice(0, 10).forEach(f => {
        const div = document.createElement('div');
        div.style.padding = "15px";
        div.style.borderBottom = "1px solid rgba(0,0,0,0.1)";
        div.innerHTML = `<b>${f.flight || 'N/A'}</b> - ${f.t || 'Unknown Type'}`;
        div.onclick = () => openFlight(f.hex);
        list.appendChild(div);
    });
}

$('handle').onclick = () => $('sheet').classList.toggle('open');

setInterval(updateData, 5000);
updateData();

</script>
</body>
</html>
