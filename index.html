<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OverHead Globe</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tile.openstreetmap.org" />
  <link rel="preconnect" href="https://api.adsb.lol" />
  <link rel="preconnect" href="https://query.wikidata.org" />
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <style>
    :root{
      --bg:#08111f;
      --bg2:#10233f;
      --glass:rgba(255,255,255,.12);
      --glass-strong:rgba(255,255,255,.18);
      --stroke:rgba(255,255,255,.16);
      --text:#f5f7fb;
      --muted:rgba(255,255,255,.72);
      --soft:rgba(255,255,255,.52);
      --green:#37d67a;
      --orange:#ffb54a;
      --red:#ff6a6a;
      --blue:#5ba8ff;
      --shadow:0 24px 80px rgba(0,0,0,.36);
      --blur:22px;
      --radius:24px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box}
    html,body,#app,#globe{width:100%;height:100%;margin:0}
    html,body{
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(91,168,255,.18), transparent 45%),
        radial-gradient(900px 700px at 100% 0%, rgba(120,89,255,.16), transparent 40%),
        linear-gradient(180deg, #08111f 0%, #091421 100%);
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      overflow:hidden;
    }

    #app{position:relative}
    #globe{position:absolute;inset:0}
    .cesium-viewer-bottom, .cesium-credit-logoContainer img{filter:brightness(1.2)}

    .hud{
      position:absolute;
      z-index:10;
      backdrop-filter: blur(var(--blur)) saturate(1.35);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.35);
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .topbar{
      top:calc(14px + var(--safe-top));
      left:14px;
      right:14px;
      min-height:72px;
      border-radius:28px;
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .brand-badge{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg, rgba(91,168,255,.28), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14);
      flex:0 0 auto;
    }

    .brand-badge svg{width:24px;height:24px;opacity:.94}
    .brand-text{min-width:0}
    .brand-text h1{
      margin:0;
      font-size:18px;
      line-height:1.1;
      letter-spacing:.01em;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand-text p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip, button, select, input{
      font:inherit;
      color:var(--text);
    }

    button, .chip{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      border-radius:16px;
      padding:10px 12px;
      cursor:pointer;
      transition:.2s ease;
      min-height:42px;
    }

    button:hover, .chip:hover{background:rgba(255,255,255,.14)}
    button:active{transform:translateY(1px)}

    .chip.inline{
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .chip .dot{
      width:8px;height:8px;border-radius:999px;background:var(--green);
      box-shadow:0 0 0 6px rgba(55,214,122,.12);
    }

    .range-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 12px;
      height:42px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .range-wrap span{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    input[type="range"]{
      width:120px;
      accent-color:var(--blue);
      background:transparent;
    }

    .panel{
      left:14px;
      bottom:calc(14px + var(--safe-bottom));
      width:min(420px, calc(100vw - 28px));
      max-height:min(70vh, 860px);
      border-radius:30px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .panel-head{
      padding:14px 14px 8px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .panel-head h2{
      margin:0;
      font-size:15px;
      font-weight:700;
      letter-spacing:.01em;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:0 14px 10px;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{display:none}

    .tab{
      border-radius:999px;
      padding:10px 14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      cursor:pointer;
      white-space:nowrap;
    }
    .tab.active{
      color:var(--text);
      background:linear-gradient(135deg, rgba(91,168,255,.26), rgba(255,255,255,.12));
      border-color:rgba(91,168,255,.32);
    }

    .panel-body{
      overflow:auto;
      padding:12px 14px 16px;
      display:grid;
      gap:12px;
    }

    .empty{
      padding:18px;
      border-radius:22px;
      color:var(--muted);
      background:rgba(255,255,255,.06);
      border:1px dashed rgba(255,255,255,.12);
      font-size:14px;
    }

    .flight-card{
      border-radius:26px;
      padding:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07)),
        radial-gradient(120% 120% at 100% 0%, rgba(91,168,255,.16), transparent 50%);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 40px rgba(0,0,0,.18);
      display:grid;
      gap:12px;
      cursor:pointer;
      transition:.18s ease;
    }

    .flight-card:hover{transform:translateY(-1px)}
    .flight-card.selected{
      border-color:rgba(91,168,255,.36);
      box-shadow:0 18px 50px rgba(24,72,160,.24);
    }

    .card-top{
      display:grid;
      grid-template-columns:52px 1fr auto;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    .airline-mark{
      width:52px;
      height:52px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    }

    .main-meta{
      min-width:0;
      display:grid;
      gap:4px;
    }

    .eyebrow{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.09em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .title{
      font-size:19px;
      line-height:1.05;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .track-btn{
      border-radius:14px;
      padding:10px 12px;
      min-width:72px;
    }

    .route-pill{
      border-radius:18px;
      padding:12px 14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:13px;
      color:var(--text);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .route-pill .muted{color:var(--muted)}

    .telemetry{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }

    .telemetry .metric{
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      min-width:0;
    }

    .metric label{
      display:block;
      font-size:11px;
      color:var(--soft);
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:6px;
    }

    .metric strong{
      display:block;
      font-size:14px;
      font-weight:650;
      line-height:1.2;
      word-break:break-word;
    }

    .foot-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.1);
      color:var(--muted);
    }

    .badge.green{
      color:#e9fff1;
      background:rgba(55,214,122,.14);
      border-color:rgba(55,214,122,.24);
    }

    .badge.orange{
      color:#fff8ec;
      background:rgba(255,181,74,.12);
      border-color:rgba(255,181,74,.24);
    }

    .badge .dot{
      width:8px;height:8px;border-radius:999px;flex:0 0 auto
    }

    .badge.green .dot{background:var(--green)}
    .badge.orange .dot{background:var(--orange)}

    .tiny{
      color:var(--soft);
      font-size:12px;
    }

    .footer-bar{
      position:absolute;
      right:14px;
      bottom:calc(14px + var(--safe-bottom));
      z-index:10;
      width:min(320px, calc(100vw - 28px));
      padding:12px 14px;
      border-radius:22px;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .toast{
      position:absolute;
      z-index:20;
      top:calc(96px + var(--safe-top));
      right:14px;
      padding:12px 14px;
      border-radius:18px;
      max-width:min(360px, calc(100vw - 28px));
      opacity:0;
      transform:translateY(-8px);
      pointer-events:none;
      transition:.25s ease;
    }
    .toast.show{opacity:1;transform:translateY(0)}

    a{color:#b8d7ff}

    @media (max-width: 920px){
      .topbar{
        display:grid;
        grid-template-columns:1fr;
        align-items:start;
      }
      .controls{
        justify-content:flex-start;
      }
      .footer-bar{display:none}
    }

    @media (max-width: 700px){
      .panel{
        left:10px;
        right:10px;
        bottom:calc(10px + var(--safe-bottom));
        width:auto;
        max-height:56vh;
        border-radius:28px;
      }
      .topbar{
        top:calc(10px + var(--safe-top));
        left:10px;
        right:10px;
        padding:12px;
      }
      .card-top{
        grid-template-columns:48px 1fr;
      }
      .track-btn{
        grid-column:1 / -1;
        width:100%;
      }
      .telemetry{
        grid-template-columns:1fr 1fr;
      }
      input[type="range"]{width:92px}
    }

    @media (max-width: 430px){
      .telemetry{grid-template-columns:1fr}
      .brand-text h1{font-size:17px}
      .panel{max-height:60vh}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="globe"></div>

    <div class="hud topbar">
      <div class="brand">
        <div class="brand-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 13.3 21 7.5l-5.6 5.4 2.2 6.1-2.4.8-3.6-5.1-4.1 4.2v-4.8L3.8 15l-.8-1.7Z" fill="white" opacity=".92"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>OverHead Globe</h1>
          <p id="statusText">Locating you…</p>
        </div>
      </div>

      <div class="controls">
        <div class="chip inline"><span class="dot"></span><span id="liveText">Live</span></div>

        <button id="locateBtn" type="button">Use my location</button>
        <button id="refreshBtn" type="button">Refresh</button>

        <div class="range-wrap" title="Radius">
          <span id="radiusLabel">250 km</span>
          <input id="radiusRange" type="range" min="50" max="450" step="25" value="250" />
        </div>
      </div>
    </div>

    <section class="hud panel">
      <div class="panel-head">
        <h2 id="panelTitle">Flights around you</h2>
        <div class="tiny" id="summaryText">Waiting for data…</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="nearby" type="button">Nearby</button>
        <button class="tab" data-tab="overhead" type="button">Overhead</button>
        <button class="tab" data-tab="selected" type="button">Selected</button>
      </div>

      <div class="panel-body" id="panelBody"></div>
    </section>

    <div class="hud footer-bar">
      Data sources used in-app: ADSB.lol for live aircraft, Wikidata for airport/airline label enrichment, OpenStreetMap for globe imagery, and generated SVG badges/silhouettes instead of third-party trademark logo feeds.
    </div>

    <div class="hud toast" id="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Cesium.js"></script>
  <script>
    window.CESIUM_BASE_URL = "https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/";

    const state = {
      viewer: null,
      user: { lat: 60.4518, lon: 22.2666, accuracy: null },
      aircraft: [],
      selectedHex: null,
      userEntity: null,
      aircraftEntities: new Map(),
      tab: "nearby",
      radiusKm: 250,
      refreshMs: 15000,
      refreshTimer: null,
      lastRefresh: null,
      pending: false,
      caches: {
        airports: loadCache("oh_airports_v3"),
        airlines: loadCache("oh_airlines_v3")
      }
    };

    const els = {
      statusText: document.getElementById("statusText"),
      liveText: document.getElementById("liveText"),
      radiusRange: document.getElementById("radiusRange"),
      radiusLabel: document.getElementById("radiusLabel"),
      locateBtn: document.getElementById("locateBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      panelBody: document.getElementById("panelBody"),
      summaryText: document.getElementById("summaryText"),
      panelTitle: document.getElementById("panelTitle"),
      toast: document.getElementById("toast")
    };

    function loadCache(key){
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }
    }
    function saveCache(key, value){
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }

    function showToast(message){
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => els.toast.classList.remove("show"), 3000);
    }

    function num(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function clamp(n, min, max){
      return Math.min(max, Math.max(min, n));
    }

    function hashString(str=""){
      let h = 2166136261;
      for(let i=0;i<str.length;i++){
        h ^= str.charCodeAt(i);
        h += (h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24);
      }
      return Math.abs(h >>> 0);
    }

    function initialsFromName(name="", fallback="??"){
      const words = String(name).trim().split(/[\s\-_/]+/).filter(Boolean);
      if(words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
      if(words.length === 1) return words[0].slice(0,2).toUpperCase();
      return fallback.slice(0,2).toUpperCase();
    }

    function svgToDataUrl(svg){
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function buildAirlineBadge(name, code){
      const seed = hashString((code || "") + "|" + (name || ""));
      const hue = seed % 360;
      const hue2 = (hue + 36) % 360;
      const label = (code || initialsFromName(name, "FL")).slice(0,3).toUpperCase();
      const display = label.length === 3 ? label : initialsFromName(name, label);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="hsl(${hue} 82% 62%)"/>
              <stop offset="100%" stop-color="hsl(${hue2} 82% 54%)"/>
            </linearGradient>
          </defs>
          <rect width="96" height="96" rx="24" fill="url(#g)"/>
          <circle cx="78" cy="18" r="16" fill="rgba(255,255,255,.12)"/>
          <path d="M23 61 73 35l-14 16 9 21-7 3-13-16-17 13 3-18-11-6z" fill="white" opacity=".25"/>
          <text x="48" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800" fill="white">${display}</text>
        </svg>`;
      return svgToDataUrl(svg);
    }

    function buildPlaneIcon(color="#ffffff"){
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
          <g fill="${color}">
            <path d="M49 7c3 0 5 2 5 5v22l27 12c3 1 4 4 4 7v4L54 48v15l9 6v7l-14-4-14 4v-7l9-6V48L11 57v-4c0-3 2-6 4-7l27-12V12c0-3 2-5 5-5h2z"/>
          </g>
        </svg>`;
      return svgToDataUrl(svg);
    }

    function formatDistanceKm(km){
      if(km == null) return "Unknown";
      if(km < 1) return `${Math.round(km * 1000)} m`;
      return `${km.toFixed(km < 10 ? 1 : 0)} km`;
    }

    function formatHeading(deg){
      const n = num(deg);
      if(n == null) return "Unknown";
      return `${Math.round((n + 360) % 360)}°`;
    }

    function formatSpeed(ac){
      const gs = num(ac.gs);
      const tas = num(ac.tas);
      const ias = num(ac.ias);
      const parts = [];
      if(gs != null) parts.push(`GS ${Math.round(gs)} kt`);
      if(tas != null && tas !== gs) parts.push(`TAS ${Math.round(tas)} kt`);
      if(ias != null) parts.push(`IAS ${Math.round(ias)} kt`);
      return parts.length ? parts.join(" · ") : "Unknown";
    }

    function formatAltitude(ac){
      const ft = num(ac.alt_baro) ?? num(ac.alt_geom) ?? num(ac.altitude);
      if(ft == null && String(ac.alt_baro || "").toLowerCase() === "ground") return "On ground";
      if(ft == null) return "Unknown";
      return `${Math.round(ft).toLocaleString("en-US")} ft · ${Math.round(ft * 0.3048).toLocaleString("en-US")} m`;
    }

    function formatVertical(ac){
      const roc = num(ac.baro_rate) ?? num(ac.geom_rate) ?? num(ac.vert_rate);
      if(roc == null) return "Unknown";
      const arrow = roc > 150 ? "Climb" : roc < -150 ? "Descent" : "Level";
      return `${arrow} ${Math.round(Math.abs(roc)).toLocaleString("en-US")} fpm`;
    }

    function relativeTime(ms){
      const s = Math.round(ms / 1000);
      if(Math.abs(s) < 60) return `${Math.abs(s)} sec`;
      const m = Math.round(Math.abs(s) / 60);
      return `${m} min`;
    }

    function distanceKm(lat1, lon1, lat2, lon2){
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function parseCarrierCode(ac){
      const direct = [ac.airline_icao, ac.operator_icao, ac.ownOp, ac.airline_iata, ac.operator_iata]
        .find(v => typeof v === "string" && v.trim());
      if(direct) return direct.trim().toUpperCase();

      const flight = (ac.flight || ac.callsign || "").trim().toUpperCase();
      const m = flight.match(/^([A-Z0-9]{2,3})/);
      return m ? m[1] : "";
    }

    function parseRouteCodes(ac){
      const candidates = [
        ac.route,
        ac.route_icao,
        ac.route_iata,
        [ac.from, ac.to].filter(Boolean).join("-"),
        [ac.origin, ac.destination].filter(Boolean).join("-"),
        [ac.dep_iata, ac.arr_iata].filter(Boolean).join("-"),
        [ac.dep_icao, ac.arr_icao].filter(Boolean).join("-")
      ].filter(Boolean).map(v => String(v).trim());

      for(const raw of candidates){
        const m = raw.match(/([A-Z0-9]{3,4})\s*[-–>]\s*([A-Z0-9]{3,4})/i);
        if(m) return { from: m[1].toUpperCase(), to: m[2].toUpperCase() };
      }
      return { from: "", to: "" };
    }

    function closestApproach(ac, user){
      const lat = num(ac.lat), lon = num(ac.lon);
      const track = num(ac.track ?? ac.true_heading ?? ac.nav_heading);
      const speedKt = num(ac.gs ?? ac.tas ?? ac.ias);
      if(lat == null || lon == null || track == null || speedKt == null || speedKt < 40) return null;

      const R = 6371000;
      const lat0 = user.lat * Math.PI / 180;
      const dLat = (lat - user.lat) * Math.PI / 180;
      const dLon = (lon - user.lon) * Math.PI / 180;

      const x = dLon * Math.cos(lat0) * R;
      const y = dLat * R;
      const speed = speedKt * 0.514444;
      const hdg = track * Math.PI / 180;
      const vx = Math.sin(hdg) * speed;
      const vy = Math.cos(hdg) * speed;

      const v2 = vx*vx + vy*vy;
      if(v2 < 1) return null;

      const tClosest = -((x*vx) + (y*vy)) / v2;
      const cx = x + vx * tClosest;
      const cy = y + vy * tClosest;
      const miss = Math.hypot(cx, cy);
      const nowDist = Math.hypot(x, y);
      const threshold = 5000;

      if(miss > threshold) return null;

      if(tClosest >= 0 && tClosest <= 30 * 60){
        return {
          kind: "incoming",
          etaSec: tClosest,
          missMeters: miss,
          nowMeters: nowDist
        };
      }

      if(tClosest < 0 && Math.abs(tClosest) <= 30 * 60){
        return {
          kind: "passed",
          passedSec: Math.abs(tClosest),
          missMeters: miss,
          nowMeters: nowDist
        };
      }

      return null;
    }

    function overheadBadge(ac){
      if(!ac.overhead) return `<span class="badge"><span class="dot" style="background:#7f8ba6"></span>No overhead crossing</span>`;
      if(ac.overhead.kind === "incoming"){
        return `<span class="badge green"><span class="dot"></span>ETA ${relativeTime(ac.overhead.etaSec * 1000)}</span>`;
      }
      return `<span class="badge orange"><span class="dot"></span>Passed ${relativeTime(ac.overhead.passedSec * 1000)} ago</span>`;
    }

    function airportLabel(code){
      const meta = state.caches.airports[String(code || "").toUpperCase()];
      return meta ? meta.name : code || "Unknown";
    }

    function airportCountry(code){
      const meta = state.caches.airports[String(code || "").toUpperCase()];
      return meta ? meta.country : "";
    }

    function airlineLabel(code){
      const meta = state.caches.airlines[String(code || "").toUpperCase()];
      return meta ? meta.name : code || "Unknown operator";
    }

    function currentModel(ac){
      return ac.desc || ac.model || ac.t || ac.type || "Unknown aircraft";
    }

    function registration(ac){
      return ac.r || ac.reg || ac.registration || "Unknown reg";
    }

    function flightLabel(ac){
      return (ac.flight || ac.callsign || ac.hex || "Unknown").trim();
    }

    function telemetryCountryText(ac, route){
      const airlineCode = parseCarrierCode(ac);
      const opCountry = state.caches.airlines[airlineCode]?.country || "";
      const fromCountry = route.from ? airportCountry(route.from) : "";
      const toCountry = route.to ? airportCountry(route.to) : "";
      const a = fromCountry || opCountry || "Unknown";
      const b = toCountry || "Unknown";
      return `${a} → ${b}`;
    }

    async function wikidataQuery(query){
      const url = "https://query.wikidata.org/sparql?format=json&query=" + encodeURIComponent(query);
      const res = await fetch(url, {
        headers: {
          "Accept": "application/sparql-results+json, application/json",
          "User-Agent": "OverHead-Globe/1.0"
        }
      });
      if(!res.ok) throw new Error(`Wikidata ${res.status}`);
      return res.json();
    }

    async function resolveAirlines(codes){
      const unique = [...new Set(codes.map(c => String(c || "").toUpperCase()).filter(c => c && !state.caches.airlines[c]))];
      if(!unique.length) return;

      const values = unique.map(c => `"${c}"`).join(" ");
      const query = `
        SELECT ?item ?itemLabel ?code ?codeType ?countryLabel WHERE {
          VALUES ?code { ${values} }
          {
            ?item wdt:P230 ?code .
            BIND("ICAO" AS ?codeType)
          }
          UNION
          {
            ?item wdt:P229 ?code .
            BIND("IATA" AS ?codeType)
          }
          OPTIONAL { ?item wdt:P17 ?country . }
          SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
        }
      `;
      const data = await wikidataQuery(query);
      const rows = data.results?.bindings || [];
      for(const row of rows){
        const code = row.code?.value?.toUpperCase();
        if(!code) continue;
        if(!state.caches.airlines[code]){
          state.caches.airlines[code] = {
            name: row.itemLabel?.value || code,
            country: row.countryLabel?.value || ""
          };
        }
      }
      saveCache("oh_airlines_v3", state.caches.airlines);
    }

    async function resolveAirports(codes){
      const unique = [...new Set(codes.map(c => String(c || "").toUpperCase()).filter(c => c && !state.caches.airports[c]))];
      if(!unique.length) return;

      const values = unique.map(c => `"${c}"`).join(" ");
      const query = `
        SELECT ?item ?itemLabel ?code ?codeType ?countryLabel WHERE {
          VALUES ?code { ${values} }
          {
            ?item wdt:P239 ?code .
            BIND("ICAO" AS ?codeType)
          }
          UNION
          {
            ?item wdt:P238 ?code .
            BIND("IATA" AS ?codeType)
          }
          OPTIONAL { ?item wdt:P17 ?country . }
          SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
        }
      `;
      const data = await wikidataQuery(query);
      const rows = data.results?.bindings || [];
      for(const row of rows){
        const code = row.code?.value?.toUpperCase();
        if(!code) continue;
        if(!state.caches.airports[code]){
          state.caches.airports[code] = {
            name: row.itemLabel?.value || code,
            country: row.countryLabel?.value || ""
          };
        }
      }
      saveCache("oh_airports_v3", state.caches.airports);
    }

    async function fetchAircraft(){
      const { lat, lon } = state.user;
      const url = `https://api.adsb.lol/v2/lat/${lat.toFixed(4)}/lon/${lon.toFixed(4)}/dist/${state.radiusKm}`;
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      if(!res.ok) throw new Error(`ADSB ${res.status}`);
      const json = await res.json();
      return Array.isArray(json.ac) ? json.ac : (Array.isArray(json.aircraft) ? json.aircraft : []);
    }

    async function enrichAircraft(list){
      const airlineCodes = [];
      const airportCodes = [];

      for(const ac of list){
        const carrier = parseCarrierCode(ac);
        if(carrier) airlineCodes.push(carrier);
        const route = parseRouteCodes(ac);
        if(route.from) airportCodes.push(route.from);
        if(route.to) airportCodes.push(route.to);
      }

      await Promise.allSettled([
        resolveAirlines(airlineCodes),
        resolveAirports(airportCodes)
      ]);

      return list.map(ac => {
        const route = parseRouteCodes(ac);
        const carrierCode = parseCarrierCode(ac);
        const operatorName = airlineLabel(carrierCode);
        const fromName = route.from ? airportLabel(route.from) : "";
        const toName = route.to ? airportLabel(route.to) : "";
        const distKm = num(ac.lat) != null && num(ac.lon) != null
          ? distanceKm(state.user.lat, state.user.lon, num(ac.lat), num(ac.lon))
          : null;

        return {
          ...ac,
          _carrierCode: carrierCode,
          _operatorName: operatorName,
          _route: route,
          _fromName: fromName,
          _toName: toName,
          _distanceKm: distKm,
          overhead: closestApproach(ac, state.user)
        };
      });
    }

    function markerColor(ac){
      const alt = num(ac.alt_baro) ?? num(ac.alt_geom) ?? 0;
      if(ac.overhead?.kind === "incoming") return "#63ff9d";
      if(ac.overhead?.kind === "passed") return "#ffc164";
      if(alt > 35000) return "#d7e6ff";
      if(alt > 15000) return "#8dc0ff";
      return "#ffffff";
    }

    function ensureViewer(){
      if(state.viewer) return;

      state.viewer = new Cesium.Viewer("globe", {
        animation: false,
        timeline: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        baseLayerPicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        infoBox: false,
        selectionIndicator: false,
        skyBox: false,
        shouldAnimate: true,
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({
          url: "https://tile.openstreetmap.org/"
        })
      });

      const v = state.viewer;
      v.scene.globe.enableLighting = true;
      v.scene.globe.showGroundAtmosphere = true;
      v.scene.skyAtmosphere.show = true;
      v.scene.globe.baseColor = Cesium.Color.fromCssColorString("#07111e");
      v.scene.backgroundColor = Cesium.Color.fromCssColorString("#050a14");
      v.scene.screenSpaceCameraController.minimumZoomDistance = 1800000;
      v.scene.screenSpaceCameraController.maximumZoomDistance = 50000000;
      v.clock.shouldAnimate = true;

      v.screenSpaceEventHandler.setInputAction((movement) => {
        const picked = v.scene.pick(movement.position);
        if(picked && picked.id && picked.id.properties && picked.id.properties.hex){
          state.selectedHex = picked.id.properties.hex.getValue();
          state.tab = "selected";
          updateTabs();
          renderPanel();
          renderAircraft();
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    }

    function flyToUser(initial=false){
      const v = state.viewer;
      if(!v) return;
      v.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(state.user.lon, state.user.lat, initial ? 8500000 : 5200000),
        duration: initial ? 0 : 1.6
      });
    }

    function renderUser(){
      if(!state.viewer) return;
      if(state.userEntity) state.viewer.entities.remove(state.userEntity);

      state.userEntity = state.viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(state.user.lon, state.user.lat, 0),
        point: {
          pixelSize: 12,
          color: Cesium.Color.fromCssColorString("#5ba8ff"),
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2
        },
        label: {
          text: "You",
          font: "600 13px Inter, sans-serif",
          fillColor: Cesium.Color.WHITE,
          showBackground: true,
          backgroundColor: Cesium.Color.fromCssColorString("rgba(7,17,30,.65)"),
          pixelOffset: new Cesium.Cartesian2(0, -24)
        }
      });
    }

    function renderAircraft(){
      if(!state.viewer) return;

      for(const [, entity] of state.aircraftEntities){
        state.viewer.entities.remove(entity);
      }
      state.aircraftEntities.clear();

      const list = [...state.aircraft]
        .filter(ac => num(ac.lat) != null && num(ac.lon) != null)
        .sort((a,b) => (a._distanceKm ?? 99999) - (b._distanceKm ?? 99999))
        .slice(0, 450);

      for(const ac of list){
        const selected = ac.hex === state.selectedHex;
        const heading = num(ac.track ?? ac.true_heading ?? ac.nav_heading) ?? 0;
        const altFt = num(ac.alt_geom) ?? num(ac.alt_baro) ?? 0;
        const color = markerColor(ac);

        const entity = state.viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(num(ac.lon), num(ac.lat), Math.max(0, altFt * 0.3048)),
          billboard: {
            image: buildPlaneIcon(color),
            width: selected ? 30 : 24,
            height: selected ? 30 : 24,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            alignedAxis: Cesium.Cartesian3.UNIT_Z,
            rotation: Cesium.Math.toRadians(heading),
            scaleByDistance: new Cesium.NearFarScalar(1.5e6, 1.2, 2.0e7, 0.48)
          },
          label: selected ? {
            text: `${flightLabel(ac)}\n${Math.round(ac._distanceKm || 0)} km`,
            font: "600 12px Inter, sans-serif",
            fillColor: Cesium.Color.WHITE,
            showBackground: true,
            backgroundColor: Cesium.Color.fromCssColorString("rgba(7,17,30,.74)"),
            pixelOffset: new Cesium.Cartesian2(0, -30),
            distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 1.8e7)
          } : undefined,
          properties: {
            hex: ac.hex || ""
          }
        });

        state.aircraftEntities.set(ac.hex, entity);
      }
    }

    function trackSelected(){
      const ac = state.aircraft.find(x => x.hex === state.selectedHex);
      if(!ac || !state.viewer || num(ac.lat) == null || num(ac.lon) == null) return;
      const altFt = num(ac.alt_geom) ?? num(ac.alt_baro) ?? 28000;
      state.viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(num(ac.lon), num(ac.lat), Math.max(300000, altFt * 0.3048 + 450000)),
        duration: 1.4
      });
    }

    function updateStatus(){
      const loc = `${state.user.lat.toFixed(3)}, ${state.user.lon.toFixed(3)}`;
      const acc = state.user.accuracy ? ` · ±${Math.round(state.user.accuracy)} m` : "";
      els.statusText.textContent = state.pending
        ? `Refreshing around ${loc}${acc}`
        : `Watching around ${loc}${acc}`;

      const total = state.aircraft.length;
      const overheadCount = state.aircraft.filter(a => a.overhead).length;
      const stamp = state.lastRefresh ? new Date(state.lastRefresh).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "—";
      els.summaryText.textContent = `${total} flights · ${overheadCount} overhead · ${stamp}`;
      els.liveText.textContent = state.pending ? "Refreshing…" : "Live";
      els.radiusLabel.textContent = `${state.radiusKm} km`;
    }

    function routeText(ac){
      const r = ac._route || { from:"", to:"" };
      if(!r.from && !r.to) return "Route unavailable";

      const fromLabel = ac._fromName || r.from || "Unknown";
      const toLabel = ac._toName || r.to || "Unknown";
      const fromCountry = airportCountry(r.from);
      const toCountry = airportCountry(r.to);

      return `
        <span><span class="muted">${r.from || "—"}</span> ${fromLabel}</span>
        <span class="muted">${fromCountry || "Unknown"} → ${toCountry || "Unknown"}</span>
        <span><span class="muted">${r.to || "—"}</span> ${toLabel}</span>
      `;
    }

    function createCard(ac, selected=false){
      const flight = flightLabel(ac);
      const airline = ac._operatorName || ac._carrierCode || "Unknown operator";
      const badge = buildAirlineBadge(airline, ac._carrierCode || flight.slice(0,3));
      const dist = formatDistanceKm(ac._distanceKm);
      const type = currentModel(ac);
      const countries = telemetryCountryText(ac, ac._route || {from:"",to:""});
      const heading = formatHeading(ac.track ?? ac.true_heading ?? ac.nav_heading);

      return `
        <article class="flight-card ${selected ? "selected" : ""}" data-hex="${ac.hex}">
          <div class="card-top">
            <img class="airline-mark" src="${badge}" alt="" />
            <div class="main-meta">
              <div class="eyebrow">${escapeHtml(airline)}</div>
              <div class="title">${escapeHtml(flight)}</div>
              <div class="subtitle">${escapeHtml(registration(ac))} · ${escapeHtml(type)}</div>
            </div>
            <button class="track-btn" type="button" data-track="${ac.hex}">Track</button>
          </div>

          <div class="route-pill">${routeText(ac)}</div>

          <div class="telemetry">
            <div class="metric">
              <label>Distance</label>
              <strong>${dist}</strong>
            </div>
            <div class="metric">
              <label>Heading</label>
              <strong>${heading}</strong>
            </div>
            <div class="metric">
              <label>Speed</label>
              <strong>${escapeHtml(formatSpeed(ac))}</strong>
            </div>
            <div class="metric">
              <label>Altitude</label>
              <strong>${escapeHtml(formatAltitude(ac))}</strong>
            </div>
            <div class="metric">
              <label>Vertical</label>
              <strong>${escapeHtml(formatVertical(ac))}</strong>
            </div>
            <div class="metric">
              <label>Countries</label>
              <strong>${escapeHtml(countries)}</strong>
            </div>
          </div>

          <div class="foot-row">
            ${overheadBadge(ac)}
            <span class="tiny">${escapeHtml(ac.hex || "no hex")} · ${escapeHtml(ac.squawk || "no squawk")}</span>
          </div>
        </article>
      `;
    }

    function escapeHtml(str=""){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderPanel(){
      updateStatus();

      const nearby = [...state.aircraft].sort((a,b) => (a._distanceKm ?? 99999) - (b._distanceKm ?? 99999));
      const overhead = nearby
        .filter(a => a.overhead)
        .sort((a,b) => {
          const av = a.overhead.kind === "incoming" ? a.overhead.etaSec : a.overhead.passedSec;
          const bv = b.overhead.kind === "incoming" ? b.overhead.etaSec : b.overhead.passedSec;
          return av - bv;
        });

      const selected = state.aircraft.find(a => a.hex === state.selectedHex) || nearby[0] || null;

      els.panelTitle.textContent =
        state.tab === "nearby" ? "Flights around you" :
        state.tab === "overhead" ? "Smart overhead" : "Selected flight";

      if(state.tab === "nearby"){
        if(!nearby.length){
          els.panelBody.innerHTML = `<div class="empty">No aircraft found inside the selected radius right now.</div>`;
          return;
        }
        els.panelBody.innerHTML = nearby.slice(0, 20).map(ac => createCard(ac, ac.hex === state.selectedHex)).join("");
        return;
      }

      if(state.tab === "overhead"){
        if(!overhead.length){
          els.panelBody.innerHTML = `<div class="empty">No clear overhead crossings predicted within the current window. Increase radius or wait for the next refresh.</div>`;
          return;
        }
        els.panelBody.innerHTML = overhead.slice(0, 20).map(ac => createCard(ac, ac.hex === state.selectedHex)).join("");
        return;
      }

      if(!selected){
        els.panelBody.innerHTML = `<div class="empty">Select a flight from the list or tap an aircraft on the globe.</div>`;
        return;
      }
      els.panelBody.innerHTML = createCard(selected, true);
    }

    function updateTabs(){
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === state.tab);
      });
    }

    async function refreshData(fly=false){
      if(state.pending) return;
      state.pending = true;
      updateStatus();

      try{
        const raw = await fetchAircraft();
        const filtered = raw.filter(ac => num(ac.lat) != null && num(ac.lon) != null);
        state.aircraft = await enrichAircraft(filtered);
        state.lastRefresh = Date.now();

        if(!state.selectedHex && state.aircraft[0]) state.selectedHex = state.aircraft[0].hex;
        if(state.selectedHex && !state.aircraft.find(a => a.hex === state.selectedHex)){
          state.selectedHex = state.aircraft[0]?.hex || null;
        }

        renderUser();
        renderAircraft();
        renderPanel();

        if(fly) flyToUser(false);
      }catch(err){
        console.error(err);
        showToast("Refresh failed. Check network or CORS support.");
      }finally{
        state.pending = false;
        updateStatus();
      }
    }

    function startRefreshLoop(){
      clearInterval(state.refreshTimer);
      state.refreshTimer = setInterval(() => refreshData(false), state.refreshMs);
    }

    function useBrowserLocation(){
      return new Promise((resolve, reject) => {
        if(!navigator.geolocation) return reject(new Error("No geolocation"));
        navigator.geolocation.getCurrentPosition(
          pos => {
            state.user = {
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
              accuracy: pos.coords.accuracy
            };
            resolve(state.user);
          },
          reject,
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 120000 }
        );
      });
    }

    function bindUI(){
      els.radiusRange.value = String(state.radiusKm);
      els.radiusLabel.textContent = `${state.radiusKm} km`;

      els.radiusRange.addEventListener("input", e => {
        state.radiusKm = Number(e.target.value);
        els.radiusLabel.textContent = `${state.radiusKm} km`;
      });

      els.radiusRange.addEventListener("change", () => refreshData(false));
      els.refreshBtn.addEventListener("click", () => refreshData(false));
      els.locateBtn.addEventListener("click", async () => {
        try{
          await useBrowserLocation();
          renderUser();
          flyToUser(false);
          refreshData(true);
        }catch{
          showToast("Using saved fallback location.");
          flyToUser(false);
          refreshData(false);
        }
      });

      document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          state.tab = btn.dataset.tab;
          updateTabs();
          renderPanel();
        });
      });

      els.panelBody.addEventListener("click", e => {
        const trackBtn = e.target.closest("[data-track]");
        if(trackBtn){
          state.selectedHex = trackBtn.dataset.track;
          state.tab = "selected";
          updateTabs();
          renderPanel();
          renderAircraft();
          trackSelected();
          return;
        }

        const card = e.target.closest("[data-hex]");
        if(card){
          state.selectedHex = card.dataset.hex;
          state.tab = "selected";
          updateTabs();
          renderPanel();
          renderAircraft();
          trackSelected();
        }
      });
    }

    async function boot(){
      ensureViewer();
      bindUI();
      renderUser();
      flyToUser(true);
      renderPanel();
      startRefreshLoop();

      try{
        await useBrowserLocation();
      }catch{
        showToast("Location permission denied. Using fallback location.");
      }

      renderUser();
      flyToUser(false);
      await refreshData(true);
    }

    boot();
  </script>
</body>
</html>
